<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Number Checker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container py-5 text-center">

<h2>Even Odd & Number Printer</h2>

<input type="number" id="num" class="form-control mb-3" placeholder="Enter a number">

<button class="btn btn-primary" onclick="checkNumber()">Check</button>

<div id="result" class="mt-4"></div>

</div>

<script>

function checkNumber() {

    // Step 1: Get input
    let num = parseInt(document.getElementById("num").value);

    // Step 2: Validation
    if (isNaN(num)) {
        alert("Please enter a valid number");
        return;
    }

    let output = "";

    // Step 3: Check Even or Odd
    if (num % 2 === 0) {
        output += "<h4 class='text-success'>Number is EVEN</h4>";
    } else {
        output += "<h4 class='text-danger'>Number is ODD</h4>";
    }

    // Step 4: Print numbers using loop
    output += "<p>Numbers from 1 to " + num + ":</p>";

    for (let i = 1; i <= num; i++) {
        output += i + " ";
    }

    // Step 5: Display result
    document.getElementById("result").innerHTML = output;
}

</script>

</body>
</html>
