<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<title>Puma Navbar Clone</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
}

/* NAVBAR */
.navbar{
border-bottom:1px solid #eee;
padding:12px 0;
background-color: black;
}

.navbar-brand img{
height:32px;
}

/* MENU */
.nav-link{
font-weight:600;
font-size:14px;
margin:0 12px;
color:black !important;
}

.nav-link:hover{
color:#ff0000 !important;
}

/* SEARCH BAR */
.search-box{
position:relative;
}

.search-box input{
padding-left:35px;
border-radius:20px;
border:1px solid #ddd;
font-size:14px;
}

.search-box i{
position:absolute;
left:12px;
top:8px;
color:gray;
}

/* ICONS */
.nav-icons i{
font-size:20px;
margin-left:18px;
cursor:pointer;
}

</style>
</head>

<body>

<nav class="navbar navbar-expand-lg bg-white">
<div class="container-fluid px-4">

<!-- LOGO -->
<a class="navbar-brand" href="#">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fd/Puma_logo.svg">
</a>

<!-- MOBILE BUTTON -->
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<!-- CENTER MENU -->
<ul class="navbar-nav mx-auto">
<li class="nav-item"><a class="nav-link" href="#">NEW</a></li>
<li class="nav-item"><a class="nav-link" href="#">MEN</a></li>
<li class="nav-item"><a class="nav-link" href="#">WOMEN</a></li>
<li class="nav-item"><a class="nav-link" href="#">KIDS</a></li>
<li class="nav-item"><a class="nav-link" href="#">SPORTS</a></li>
<li class="nav-item"><a class="nav-link" href="#">MOTORSPORT</a></li>
<li class="nav-item"><a class="nav-link text-danger" href="#">SALE</a></li>
</ul>

<!-- SEARCH -->
<div class="search-box me-3">
<i class="bi bi-search"></i>
<input type="text" class="form-control" placeholder="Search Puma">
</div>

<!-- ICONS -->
<div class="nav-icons d-flex">
<i class="bi bi-person"></i>
<i class="bi bi-heart"></i>
<i class="bi bi-bag"></i>
</div>

</div>
</div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
